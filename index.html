<!DOCTYPE html>
<html>
<head>
<title>Image Resize in KB</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.container{
background:white;
width:420px;
margin:40px auto;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
margin-bottom:5px;
}

p{
color:gray;
font-size:14px;
}

.drop-box{
border:2px dashed #aaa;
padding:40px;
margin-top:20px;
border-radius:10px;
background:#fafafa;
}

button{
padding:10px 20px;
margin-top:10px;
border:none;
border-radius:6px;
background:#007bff;
color:white;
cursor:pointer;
font-size:14px;
margin:5px;
}

button:hover{
background:#0056b3;
}

input{
margin-top:15px;
padding:6px;
width:100px;
}

.quick-buttons button{
background:#28a745;
}

.quick-buttons button:hover{
background:#1e7e34;
}

</style>
</head>

<body>

<div class="container">

<h1>Image Resize in KB</h1>

<p>Compress an image to 20kb, 50kb, 200kb, or any other size</p>

<div class="drop-box">
<p>Select or Drag and Drop Image Here</p>

<button onclick="document.getElementById('imageInput').click()">
Select Image
</button>

<input type="file" id="imageInput" accept="image/*" hidden>

</div>

<br>

<label>Enter Size (KB)</label><br>
<input type="number" id="size" placeholder="50">

<br>

<p style="margin-top:15px;">Quick Compress</p>

<div class="quick-buttons">
<button onclick="setSize(20)">20 KB</button>
<button onclick="setSize(30)">30 KB</button>
<button onclick="setSize(40)">40 KB</button>
<button onclick="setSize(50)">50 KB</button>
</div>

<br>

<button onclick="resizeImage()">
Resize Image
</button>

<br>

<button id="downloadBtn" style="display:none;">
Download Image
</button>

</div>

<script>

let resizedImage = "";

function setSize(kb){
document.getElementById("size").value = kb;
}

function resizeImage(){

let file = document.getElementById("imageInput").files[0];

if(!file){
alert("Please select image");
return;
}

let reader = new FileReader();

reader.onload = function(e){

let img = new Image();

img.onload = function(){

let canvas = document.createElement("canvas");
let ctx = canvas.getContext("2d");

canvas.width = img.width;
canvas.height = img.height;

ctx.drawImage(img,0,0);

resizedImage = canvas.toDataURL("image/jpeg",0.7);

document.getElementById("downloadBtn").style.display="inline-block";

}

img.src = e.target.result;

}

reader.readAsDataURL(file);

}

document.getElementById("downloadBtn").onclick=function(){

let a=document.createElement("a");
a.href=resizedImage;
a.download="compressed-image.jpg";
a.click();

}

</script>

</body>
</html>
