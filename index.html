<!DOCTYPE html>
<html>
<head>
<title>Image Resizer Tool</title>

<style>

body{
  font-family:Arial;
  background:#f2f2f2;
  text-align:center;
}

.container{
  background:white;
  width:420px;
  margin:40px auto;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* Upload box */
.drop{
  border:2px dashed #999;
  height:200px;
  cursor:pointer;
  margin-bottom:15px;
  border-radius:10px;
  background:#fafafa;

  display:flex;
  align-items:center;
  justify-content:center;
}

.drop:hover{
  background:#f0f0f0;
}

/* Text */
.drop span{
  font-size:18px;
  color:#555;
}

/* Buttons */
button{
  padding:8px 15px;
  margin:5px;
  cursor:pointer;
}

canvas{
  display:block;
  margin:15px auto;
  max-width:100%;
}

#download{
  display:inline-block;
  margin-top:10px;
  padding:10px 20px;
  background:#4CAF50;
  color:white;
  text-decoration:none;
  border-radius:4px;
}

</style>
</head>

<body>

<div class="container">

<h2>Image Resize Tool</h2>

<div class="drop" id="dropArea">

<span>Select or Drag Image</span>

<input type="file" id="file" hidden>

</div>

<p>Width: <span id="w"></span></p>
<p>Height: <span id="h"></span></p>

<p>Target Size (KB)</p>
<input type="number" id="kb" placeholder="Example 200">

<br>
<button onclick="resize()">Resize</button>

<br><br>

<b>Quick Compress</b>
<br>

<button onclick="compress(20)">20KB</button>
<button onclick="compress(30)">30KB</button>
<button onclick="compress(40)">40KB</button>
<button onclick="compress(50)">50KB</button>

<canvas id="canvas"></canvas>

<a id="download" download="image.jpg">Download Image</a>

</div>

<script>

let fileInput=document.getElementById("file");
let img=new Image();

fileInput.onchange=function(){

let file=this.files[0];
if(!file) return;

img.src=URL.createObjectURL(file);

}

img.onload=function(){

document.getElementById("w").innerText=img.width;
document.getElementById("h").innerText=img.height;

}

function resize(){

let kb=document.getElementById("kb").value;

if(!kb){
alert("Enter target KB");
return;
}

compress(parseInt(kb));

}

function compress(targetKB){

let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

canvas.width=img.width;
canvas.height=img.height;

ctx.drawImage(img,0,0);

let quality=0.95;
let url="";
let sizeKB=0;

while(quality>0){

url=canvas.toDataURL("image/jpeg",quality);
sizeKB=Math.round((url.length*3/4)/1024);

if(sizeKB<=targetKB) break;

quality-=0.01;

}

document.getElementById("download").href=url;

}

document.getElementById("dropArea").onclick=function(){
fileInput.click();
};

</script>

</body>
</html>
