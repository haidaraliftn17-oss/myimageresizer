<!DOCTYPE html>
<html>
<head>
<title>Image Resizer Tool</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.container{
background:white;
width:420px;
margin:40px auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.drop{
border:2px dashed #999;
padding:40px;
cursor:pointer;
margin-bottom:15px;
}

button{
padding:8px 15px;
margin-top:10px;
}
</style>

</head>

<body>

<div class="container">

<h2>Image Resize Tool</h2>

<div class="drop" onclick="document.getElementById('file').click()">
Select or Drag Image
<input type="file" id="file" hidden>
</div>

<p>Width: <span id="w"></span></p>
<p>Height: <span id="h"></span></p>

<p>Target Size (KB)</p>
<input type="number" id="kb" placeholder="Example 200">

<br>

<button onclick="resize()">Resize</button>

<br>

<canvas id="canvas"></canvas>

<br>

<a id="download" download="image.jpg">
<button>Download</button>
</a>

</div>

<script>

let fileInput=document.getElementById("file");
let img=new Image();

fileInput.onchange=function(){
let file=this.files[0];
img.src=URL.createObjectURL(file);
}

img.onload=function(){
document.getElementById("w").innerText=img.width;
document.getElementById("h").innerText=img.height;
}

function resize(){

let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

canvas.width=img.width;
canvas.height=img.height;

ctx.drawImage(img,0,0);

let url=canvas.toDataURL("image/jpeg",0.8);

document.getElementById("download").href=url;

}

</script>

</body>
</html>
