<!DOCTYPE html>
<html>
<head>
<title>Image Resize in KB</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css"/>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.container{
background:white;
width:420px;
margin:40px auto;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.drop-box{
border:2px dashed #aaa;
padding:20px;
margin-top:20px;
border-radius:10px;
background:#fafafa;
position:relative;
}

.drop-box img{
max-width:100%;
margin-top:10px;
}

button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:6px;
background:#007bff;
color:white;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

input{
margin-top:15px;
padding:6px;
width:100px;
}

.quick button{
background:#28a745;
}

.quick button:hover{
background:#1e7e34;
}

</style>
</head>

<body>

<div class="container">

<h1>Image Resize in KB</h1>

<p>Compress an image to 20kb, 50kb, 200kb, or any other size</p>

<div class="drop-box" id="dropBox">

<p id="dropText">Select or Drag and Drop Image Here</p>

<button onclick="document.getElementById('imageInput').click()">
Select Image
</button>

<input type="file" id="imageInput" accept="image/*" hidden>

<br>

<img id="preview">

</div>

<br>

<button id="cropBtn" style="display:none;">Crop Image</button>

<br><br>

<label>Enter Size (KB)</label><br>
<input type="number" id="size" placeholder="50">

<br><br>

<div class="quick">
<button onclick="setSize(20)">20 KB</button>
<button onclick="setSize(30)">30 KB</button>
<button onclick="setSize(40)">40 KB</button>
<button onclick="setSize(50)">50 KB</button>
</div>

<br>

<button onclick="resizeImage()">Resize Image</button>

<br><br>

<button id="downloadBtn" style="display:none;">Download Image</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<script>

let finalBlob;
let cropper;

document.getElementById("imageInput").addEventListener("change", function(e){

let file = e.target.files[0];
let reader = new FileReader();

reader.onload = function(event){

let img = document.getElementById("preview");
img.src = event.target.result;

document.getElementById("dropText").style.display="none";
document.getElementById("cropBtn").style.display="inline-block";

if(cropper){
cropper.destroy();
}

cropper = new Cropper(img,{
viewMode:1
});

};

reader.readAsDataURL(file);

});

document.getElementById("cropBtn").onclick=function(){

let canvas = cropper.getCroppedCanvas();

document.getElementById("preview").src = canvas.toDataURL();

cropper.destroy();

}

function setSize(kb){
document.getElementById("size").value = kb;
}

function resizeImage(){

let img=document.getElementById("preview");
let targetKB=document.getElementById("size").value;

if(!img.src){
alert("Please select image");
return;
}

let image=new Image();

image.onload=function(){

let canvas=document.createElement("canvas");
let ctx=canvas.getContext("2d");

canvas.width=image.width;
canvas.height=image.height;

ctx.drawImage(image,0,0);

let quality=0.9;

function compress(){

canvas.toBlob(function(blob){

let sizeKB = blob.size/1024;

if(sizeKB > targetKB && quality > 0.1){

quality -= 0.05;
compress();

}else{

finalBlob = blob;
document.getElementById("downloadBtn").style.display="inline-block";

}

},"image/jpeg",quality);

}

compress();

}

image.src=img.src;

}

document.getElementById("downloadBtn").onclick=function(){

let a=document.createElement("a");
a.href=URL.createObjectURL(finalBlob);
a.download="compressed-image.jpg";
a.click();

}

</script>

</body>
</html>
